name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Install ONLY the mobile app deps using plain npm.
      # No pnpm needed — @workspace/* deps have been removed.
      - name: Install mobile dependencies
        working-directory: artifacts/mobile
        run: npm install

      # Generate the native Android project from the Expo config
      - name: Expo prebuild (Android)
        working-directory: artifacts/mobile
        env:
          EXPO_PUBLIC_API_URL: https://telebit-1.replit.app
        run: npx expo prebuild --platform android --clean --no-install

      # Build the debug APK (no signing required)
      - name: Build debug APK
        working-directory: artifacts/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: telebit-debug-${{ github.run_number }}
          path: artifacts/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
