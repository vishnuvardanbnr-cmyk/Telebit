name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli@8

      - name: Install workspace dependencies
        run: pnpm install

      - name: Build shop web app
        working-directory: artifacts/shop
        run: pnpm run build
        env:
          BASE_PATH: /
          PORT: 3000

      - name: Add Capacitor Android platform
        working-directory: artifacts/shop
        run: cap add android

      - name: Apply custom app icon
        run: |
          ICON="artifacts/shop/public/logo.png"
          BASE="artifacts/shop/android/app/src/main/res"
          convert "$ICON" -resize 48x48   "$BASE/mipmap-mdpi/ic_launcher.png"
          convert "$ICON" -resize 72x72   "$BASE/mipmap-hdpi/ic_launcher.png"
          convert "$ICON" -resize 96x96   "$BASE/mipmap-xhdpi/ic_launcher.png"
          convert "$ICON" -resize 144x144 "$BASE/mipmap-xxhdpi/ic_launcher.png"
          convert "$ICON" -resize 192x192 "$BASE/mipmap-xxxhdpi/ic_launcher.png"
          convert "$ICON" -resize 48x48   "$BASE/mipmap-mdpi/ic_launcher_round.png"
          convert "$ICON" -resize 72x72   "$BASE/mipmap-hdpi/ic_launcher_round.png"
          convert "$ICON" -resize 96x96   "$BASE/mipmap-xhdpi/ic_launcher_round.png"
          convert "$ICON" -resize 144x144 "$BASE/mipmap-xxhdpi/ic_launcher_round.png"
          convert "$ICON" -resize 192x192 "$BASE/mipmap-xxxhdpi/ic_launcher_round.png"

      - name: Sync Capacitor
        working-directory: artifacts/shop
        run: cap sync android

      - name: Build debug APK
        working-directory: artifacts/shop/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: telebit-shop-debug
          path: artifacts/shop/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
