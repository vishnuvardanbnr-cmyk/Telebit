name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shop web app
        run: pnpm --filter @workspace/shop run build
        env:
          BASE_PATH: /
          PORT: 3000

      - name: Initialise Capacitor Android platform
        run: |
          cd artifacts/shop
          npx cap add android

      - name: Sync Capacitor
        run: |
          cd artifacts/shop
          npx cap sync android

      - name: Build debug APK
        run: |
          cd artifacts/shop/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: telebit-shop-debug
          path: artifacts/shop/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
