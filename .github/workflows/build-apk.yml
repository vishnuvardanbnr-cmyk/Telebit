name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js 24 and pnpm
        run: |
          curl -fsSL https://deb.nodesource.com/setup_24.x | sudo -E bash -
          sudo apt-get install -y nodejs
          node --version
          npm --version
          npm install -g pnpm@10
          # Add npm global bin to PATH for all subsequent steps
          echo "$(npm prefix -g)/bin" >> $GITHUB_PATH

      - name: Verify pnpm in PATH
        run: pnpm --version

      - name: Configure Java 21
        run: |
          echo "JAVA_HOME=$JAVA_HOME_21_X64" >> $GITHUB_ENV
          echo "$JAVA_HOME_21_X64/bin" >> $GITHUB_PATH

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shop web app
        run: pnpm --filter @workspace/shop run build
        env:
          BASE_PATH: /
          PORT: 3000

      - name: Remove android platform if previously committed
        run: rm -rf artifacts/shop/android

      - name: Initialise Capacitor Android platform
        run: |
          cd artifacts/shop
          npx cap add android

      - name: Apply custom app icon
        run: |
          ICON="artifacts/shop/public/logo.png"
          BASE="artifacts/shop/android/app/src/main/res"
          magick "$ICON" -resize 48x48   "$BASE/mipmap-mdpi/ic_launcher.png"
          magick "$ICON" -resize 72x72   "$BASE/mipmap-hdpi/ic_launcher.png"
          magick "$ICON" -resize 96x96   "$BASE/mipmap-xhdpi/ic_launcher.png"
          magick "$ICON" -resize 144x144 "$BASE/mipmap-xxhdpi/ic_launcher.png"
          magick "$ICON" -resize 192x192 "$BASE/mipmap-xxxhdpi/ic_launcher.png"
          magick "$ICON" -resize 48x48   "$BASE/mipmap-mdpi/ic_launcher_round.png"
          magick "$ICON" -resize 72x72   "$BASE/mipmap-hdpi/ic_launcher_round.png"
          magick "$ICON" -resize 96x96   "$BASE/mipmap-xhdpi/ic_launcher_round.png"
          magick "$ICON" -resize 144x144 "$BASE/mipmap-xxhdpi/ic_launcher_round.png"
          magick "$ICON" -resize 192x192 "$BASE/mipmap-xxxhdpi/ic_launcher_round.png"

      - name: Sync Capacitor
        run: |
          cd artifacts/shop
          npx cap sync android

      - name: Build debug APK
        run: |
          cd artifacts/shop/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: telebit-shop-debug
          path: artifacts/shop/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
