<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Telebit Shop</title>
    <meta name="description" content="Telebit Shop — Pay with USDT on BNB Smart Chain." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Telebit Shop" />
    <meta property="og:description" content="Telebit Shop — Pay with USDT on BNB Smart Chain." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Telebit Shop" />
    <meta name="twitter:description" content="Telebit Shop — Pay with USDT on BNB Smart Chain." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        transition: opacity 0.45s ease;
        font-family: 'Inter', sans-serif;
      }
      #splash.fade-out { opacity: 0; pointer-events: none; }

      .splash-logo {
        width: 72px;
        height: 72px;
        background: linear-gradient(135deg, #1a56db 0%, #0ea5e9 100%);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 12px 32px rgba(26,86,219,0.25);
      }
      .splash-logo svg { width: 38px; height: 38px; }

      .splash-title {
        font-size: 26px;
        font-weight: 900;
        color: #0f172a;
        letter-spacing: -0.5px;
        margin: 0;
      }
      .splash-sub {
        font-size: 13px;
        color: #94a3b8;
        margin: -12px 0 0;
        font-weight: 500;
        letter-spacing: 0.02em;
      }

      .splash-spinner {
        width: 28px;
        height: 28px;
        border: 2.5px solid #e2e8f0;
        border-top-color: #1a56db;
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
        margin-top: 8px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Splash screen — removed by React once mounted -->
    <div id="splash">
      <div class="splash-logo">
        <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="4" width="30" height="30" rx="8" fill="white" fill-opacity="0.15"/>
          <path d="M10 19H28M19 10L28 19L19 28" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <p class="splash-title">Telebit Shop</p>
      <p class="splash-sub">Pay with USDT · BEP-20</p>
      <div class="splash-spinner"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
