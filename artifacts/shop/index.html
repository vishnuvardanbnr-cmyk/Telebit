<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Telebit Shop</title>
    <meta name="description" content="Telebit Shop — Pay with USDT on BNB Smart Chain." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Telebit Shop" />
    <meta property="og:description" content="Telebit Shop — Pay with USDT on BNB Smart Chain." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Telebit Shop" />
    <meta name="twitter:description" content="Telebit Shop — Pay with USDT on BNB Smart Chain." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        transition: opacity 0.45s ease;
        font-family: 'Inter', sans-serif;
      }
      #splash.fade-out { opacity: 0; pointer-events: none; }

      .splash-logo {
        width: 88px;
        height: 88px;
        border-radius: 22px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 12px 32px rgba(0,0,0,0.12);
      }
      .splash-logo img {
        width: 88px;
        height: 88px;
        object-fit: cover;
        display: block;
      }

      .splash-title {
        font-size: 26px;
        font-weight: 900;
        color: #0f172a;
        letter-spacing: -0.5px;
        margin: 0;
      }
      .splash-sub {
        font-size: 13px;
        color: #94a3b8;
        margin: -8px 0 0;
        font-weight: 500;
        letter-spacing: 0.02em;
      }

      .splash-spinner {
        width: 28px;
        height: 28px;
        border: 2.5px solid #e2e8f0;
        border-top-color: #1a56db;
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
        margin-top: 4px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Splash screen — removed by React once mounted -->
    <div id="splash">
      <div class="splash-logo">
        <img src="/logo.png" alt="Telebit" />
      </div>
      <p class="splash-title">Telebit Shop</p>
      <p class="splash-sub">Pay with USDT · BEP-20</p>
      <div class="splash-spinner"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
