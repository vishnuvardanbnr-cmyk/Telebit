openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CryptoVault Exchange & Shop API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: users
  - name: deposits
  - name: withdrawals
  - name: p2p
  - name: admin
  - name: settings
  - name: shop
  - name: shop-admin
  - name: nft
  - name: nft-admin
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /users/me/dashboard:
    get:
      operationId: getDashboard
      tags: [users]
      summary: Get dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "401":
          description: Unauthorized

  /users/accounts:
    get:
      operationId: listSubAccounts
      tags: [users]
      summary: List all sub-accounts linked to current Telegram identity
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubAccount"
        "401":
          description: Unauthorized
    post:
      operationId: createSubAccount
      tags: [users]
      summary: Create a new sub-account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubAccountRequest"
      responses:
        "201":
          description: Sub-account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubAccount"
        "400":
          description: Bad request
        "401":
          description: Unauthorized

  /users/accounts/switch/{accountId}:
    post:
      operationId: switchSubAccount
      tags: [users]
      summary: Switch active sub-account (re-issues auth session)
      parameters:
        - in: path
          name: accountId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Switched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "403":
          description: Account not owned by this Telegram identity
        "401":
          description: Unauthorized

  /deposits:
    get:
      operationId: listDeposits
      tags: [deposits]
      summary: List user deposits
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Deposit list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deposit"
        "401":
          description: Unauthorized

  /deposits/check:
    post:
      operationId: checkDeposit
      tags: [deposits]
      summary: Check for on-chain USDT deposit
      responses:
        "200":
          description: Check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositCheckResult"
        "401":
          description: Unauthorized

  /withdrawals:
    get:
      operationId: listWithdrawals
      tags: [withdrawals]
      summary: List user withdrawals
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Withdrawal list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Withdrawal"
        "401":
          description: Unauthorized
    post:
      operationId: createWithdrawal
      tags: [withdrawals]
      summary: Request a USDT withdrawal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalRequest"
      responses:
        "201":
          description: Withdrawal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"
        "400":
          description: Validation error
        "401":
          description: Unauthorized

  /p2p:
    get:
      operationId: listP2PTransfers
      tags: [p2p]
      summary: List user P2P transfers
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: P2P transfer list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/P2PTransfer"
        "401":
          description: Unauthorized
    post:
      operationId: createP2PTransfer
      tags: [p2p]
      summary: Send USDT internally to another user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/P2PTransferRequest"
      responses:
        "201":
          description: Transfer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/P2PTransfer"
        "400":
          description: Validation error
        "401":
          description: Unauthorized

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get public platform settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicSettings"

  # ─── Shop ─────────────────────────────────────────────────────────────────

  /shop/products:
    get:
      operationId: listProducts
      tags: [shop]
      summary: List products
      parameters:
        - name: categoryId
          in: query
          schema: { type: ["string", "null"] }
        - name: search
          in: query
          schema: { type: ["string", "null"] }
        - name: minPrice
          in: query
          schema: { type: ["string", "null"] }
        - name: maxPrice
          in: query
          schema: { type: ["string", "null"] }
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, price_asc, price_desc, popular, rating]
            default: newest
        - name: limit
          in: query
          schema: { type: integer, default: 24 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"

  /shop/products/{productId}:
    get:
      operationId: getProduct
      tags: [shop]
      summary: Get product detail
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetail"
        "404":
          description: Not found

  /shop/products/{productId}/reviews:
    get:
      operationId: listProductReviews
      tags: [shop]
      summary: List reviews for a product
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Review list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createProductReview
      tags: [shop]
      summary: Post a review for a product
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "401":
          description: Unauthorized

  /shop/categories:
    get:
      operationId: listCategories
      tags: [shop]
      summary: List all product categories
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /shop/featured:
    get:
      operationId: getFeatured
      tags: [shop]
      summary: Get featured, new arrivals, top-rated, on-sale products
      responses:
        "200":
          description: Featured collections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeaturedResponse"

  /shop/cart:
    get:
      operationId: getCart
      tags: [shop]
      summary: Get current user's cart
      responses:
        "200":
          description: Cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "401":
          description: Unauthorized

  /shop/cart/items:
    post:
      operationId: addToCart
      tags: [shop]
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemInput"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "400":
          description: Validation error
        "401":
          description: Unauthorized

  /shop/cart/items/{itemId}:
    patch:
      operationId: updateCartItem
      tags: [shop]
      summary: Update cart item quantity
      parameters:
        - name: itemId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemUpdate"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "401":
          description: Unauthorized
    delete:
      operationId: removeCartItem
      tags: [shop]
      summary: Remove item from cart
      parameters:
        - name: itemId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "401":
          description: Unauthorized

  /shop/cart/clear:
    delete:
      operationId: clearCart
      tags: [shop]
      summary: Clear all items from cart
      responses:
        "200":
          description: Empty cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "401":
          description: Unauthorized

  /shop/orders:
    get:
      operationId: listOrders
      tags: [shop]
      summary: List current user's orders
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          description: Unauthorized
    post:
      operationId: createOrder
      tags: [shop]
      summary: Place an order — deducts USDT from wallet balance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Insufficient balance or validation error
        "401":
          description: Unauthorized

  /shop/orders/{orderId}:
    get:
      operationId: getOrder
      tags: [shop]
      summary: Get order detail
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

  /shop/wishlist:
    get:
      operationId: getWishlist
      tags: [shop]
      summary: Get current user's wishlist
      responses:
        "200":
          description: Wishlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wishlist"
        "401":
          description: Unauthorized

  /shop/wishlist/{productId}:
    post:
      operationId: addToWishlist
      tags: [shop]
      summary: Add product to wishlist
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Wishlist updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wishlist"
        "401":
          description: Unauthorized
    delete:
      operationId: removeFromWishlist
      tags: [shop]
      summary: Remove product from wishlist
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Wishlist updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wishlist"
        "401":
          description: Unauthorized

  # ─── Shop Admin ───────────────────────────────────────────────────────────

  /shop/admin/stats:
    get:
      operationId: adminGetShopStats
      tags: [shop-admin]
      summary: Get shop stats (admin)
      responses:
        "200":
          description: Shop stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopStats"
        "403":
          description: Forbidden

  /shop/admin/products:
    get:
      operationId: adminListProducts
      tags: [shop-admin]
      summary: List all products (admin)
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
        "403":
          description: Forbidden
    post:
      operationId: adminCreateProduct
      tags: [shop-admin]
      summary: Create a new product (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "403":
          description: Forbidden

  /shop/admin/products/{productId}:
    patch:
      operationId: adminUpdateProduct
      tags: [shop-admin]
      summary: Update a product (admin)
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "403":
          description: Forbidden
    delete:
      operationId: adminDeleteProduct
      tags: [shop-admin]
      summary: Delete a product (admin)
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted
        "403":
          description: Forbidden

  /shop/admin/categories:
    post:
      operationId: adminCreateCategory
      tags: [shop-admin]
      summary: Create a category (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "403":
          description: Forbidden

  /shop/admin/orders:
    get:
      operationId: adminListOrders
      tags: [shop-admin]
      summary: List all orders (admin)
      parameters:
        - name: status
          in: query
          schema: { type: ["string", "null"] }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: All orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "403":
          description: Forbidden

  /shop/admin/orders/{orderId}/status:
    patch:
      operationId: adminUpdateOrderStatus
      tags: [shop-admin]
      summary: Update order status (admin)
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "403":
          description: Forbidden

  # ─── Exchange Admin ───────────────────────────────────────────────────────

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users (admin)
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
        - name: search
          in: query
          schema: { type: string }
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/users/{userId}/block:
    patch:
      operationId: adminToggleUserBlock
      tags: [admin]
      summary: Toggle withdrawal block on user
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlockToggle"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/deposits:
    get:
      operationId: adminListDeposits
      tags: [admin]
      summary: List all deposits (admin)
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Deposit list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deposit"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/withdrawals:
    get:
      operationId: adminListWithdrawals
      tags: [admin]
      summary: List all withdrawals (admin)
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Withdrawal list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Withdrawal"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/withdrawals/{id}/approve:
    post:
      operationId: adminApproveWithdrawal
      tags: [admin]
      summary: Approve a pending withdrawal
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Withdrawal approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/withdrawals/{id}/reject:
    post:
      operationId: adminRejectWithdrawal
      tags: [admin]
      summary: Reject a pending withdrawal
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Withdrawal rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /auth/otp/send:
    post:
      operationId: requestPhoneOtp
      tags: [settings]
      summary: Send OTP to phone number via Telegram bot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpSendRequest"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "400":
          description: Bad request
        "404":
          description: Phone not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  hint:
                    type: string
                  botUsername:
                    type: string
        "429":
          description: Too many requests
        "503":
          description: Bot not configured

  /auth/otp/verify:
    post:
      operationId: confirmPhoneOtp
      tags: [settings]
      summary: Verify OTP and get session cookie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpVerifyRequest"
      responses:
        "200":
          description: Verified, session cookie set
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "401":
          description: Invalid or expired code
        "429":
          description: Too many attempts

  /settings/telegram:
    get:
      operationId: getTelegramConfig
      tags: [settings]
      summary: Get public Telegram bot config (no auth required)
      responses:
        "200":
          description: Telegram bot config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramConfig"

  /admin/settings:
    get:
      operationId: adminGetSettings
      tags: [admin]
      summary: Get all platform settings (admin)
      responses:
        "200":
          description: All settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSettings"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
    put:
      operationId: adminUpdateSettings
      tags: [admin]
      summary: Update platform settings (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSettings"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Get platform stats (admin)
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  # ─── NFT / V2 Token Economy ──────────────────────────────────────────────────

  /nft/global:
    get:
      operationId: getNftGlobal
      tags: [nft]
      summary: Get global NFT token economy state
      responses:
        "200":
          description: Global amounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NftGlobal"
        "404":
          description: Not initialized

  /nft/buy:
    post:
      operationId: buyNftTokens
      tags: [nft]
      summary: Purchase V2 tokens (Flow 2)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NftBuyRequest"
      responses:
        "200":
          description: Purchase successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NftBuyResult"
        "400":
          description: Validation error

  /nft/nfts:
    get:
      operationId: listNfts
      tags: [nft]
      summary: List active NFTs with their pools
      responses:
        "200":
          description: NFT list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NftWithPools"

  /nft/pools:
    get:
      operationId: listNftPools
      tags: [nft]
      summary: List active NFT pools
      responses:
        "200":
          description: Pool list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NftPoolWithNft"

  /nft/pools/{poolId}/bid:
    post:
      operationId: bidNftPool
      tags: [nft]
      summary: Bid in an NFT pool (Flow 3)
      parameters:
        - name: poolId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NftBidRequest"
      responses:
        "200":
          description: Bid successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NftBidResult"
        "400":
          description: Validation error
        "404":
          description: Pool not found

  /nft/holdings:
    get:
      operationId: getNftHoldings
      tags: [nft]
      summary: Get current user's NFT holdings
      responses:
        "200":
          description: Holdings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NftHolding"

  /nft/purchases:
    get:
      operationId: listNftPurchases
      tags: [nft]
      summary: List current user's V2 token purchase history
      responses:
        "200":
          description: Purchase transaction list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NftPurchaseTransaction"

  /nft/holdings/claim:
    post:
      operationId: claimNftHoldings
      tags: [nft]
      summary: Claim NFT token rewards to wallet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NftClaimRequest"
      responses:
        "200":
          description: Claim successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NftClaimResult"
        "400":
          description: No tokens to claim

  /admin/nft/global:
    get:
      operationId: adminGetNftGlobal
      tags: [nft-admin]
      summary: Get NFT global config (admin)
      responses:
        "200":
          description: Global config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NftGlobal"
    put:
      operationId: adminUpdateNftGlobal
      tags: [nft-admin]
      summary: Create or update NFT global config (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NftGlobalUpdate"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NftGlobal"

  /admin/nft/nfts:
    get:
      operationId: adminListNfts
      tags: [nft-admin]
      summary: List all NFTs (admin)
      responses:
        "200":
          description: NFT list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NftWithPools"
    post:
      operationId: adminCreateNft
      tags: [nft-admin]
      summary: Create a new NFT (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NftCreateRequest"
      responses:
        "200":
          description: Created NFT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NftItem"

  /admin/nft/nfts/{nftId}:
    patch:
      operationId: adminUpdateNft
      tags: [nft-admin]
      summary: Update NFT (admin)
      parameters:
        - name: nftId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NftUpdateRequest"
      responses:
        "200":
          description: Updated NFT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NftItem"
        "404":
          description: Not found

  /admin/nft/pools:
    get:
      operationId: adminListNftPools
      tags: [nft-admin]
      summary: List all NFT pools (admin)
      responses:
        "200":
          description: Pool list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NftPoolWithNft"
    post:
      operationId: adminCreateNftPool
      tags: [nft-admin]
      summary: Create a pool for an NFT (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NftPoolCreateRequest"
      responses:
        "200":
          description: Created pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NftPool"

  /admin/nft/pools/{poolId}:
    patch:
      operationId: adminUpdateNftPool
      tags: [nft-admin]
      summary: Update NFT pool status (admin)
      parameters:
        - name: poolId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NftPoolStatusUpdate"
      responses:
        "200":
          description: Updated pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NftPool"

  /admin/users/{id}/nft:
    patch:
      operationId: adminSetUserNft
      tags: [nft-admin]
      summary: Set user investedUsdt (activate NFT eligibility)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserNftActivation"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserNftActivationResult"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    SubAccount:
      type: object
      required: [id, fullName, walletBalance, telegramChatId]
      properties:
        id: { type: string }
        fullName: { type: ["string", "null"] }
        telegramUsername: { type: ["string", "null"] }
        telegramPhotoUrl: { type: ["string", "null"] }
        telegramChatId: { type: string }
        walletBalance: { type: string }
        isCurrentAccount: { type: boolean }

    CreateSubAccountRequest:
      type: object
      required: [alias]
      properties:
        alias: { type: string }
        initialFund: { type: number }

    User:
      type: object
      required: [id, clerkId, email, walletBalance, earningsBalance, depositAddress, referralCode, isAdmin, withdrawalBlocked, createdAt]
      properties:
        id: { type: string }
        clerkId: { type: string }
        email: { type: string }
        fullName: { type: ["string", "null"] }
        telegramUsername: { type: ["string", "null"] }
        telegramPhotoUrl: { type: ["string", "null"] }
        telegramChatId: { type: ["string", "null"] }
        parentUserId: { type: ["string", "null"] }
        walletBalance: { type: string }
        earningsBalance: { type: string }
        depositAddress: { type: string }
        referralCode: { type: string }
        isAdmin: { type: boolean }
        withdrawalBlocked: { type: boolean }
        createdAt: { type: string, format: date-time }

    AdminUser:
      type: object
      required: [id, clerkId, email, walletBalance, earningsBalance, depositAddress, referralCode, isAdmin, withdrawalBlocked, createdAt]
      properties:
        id: { type: string }
        clerkId: { type: string }
        email: { type: string }
        fullName: { type: ["string", "null"] }
        walletBalance: { type: string }
        earningsBalance: { type: string }
        depositAddress: { type: string }
        referralCode: { type: string }
        isAdmin: { type: boolean }
        withdrawalBlocked: { type: boolean }
        createdAt: { type: string, format: date-time }
        totalDeposited: { type: string }
        totalWithdrawn: { type: string }

    DashboardSummary:
      type: object
      required: [walletBalance, earningsBalance, depositAddress, totalDeposited, totalWithdrawn, pendingWithdrawals, recentDeposits, recentWithdrawals, recentP2P]
      properties:
        walletBalance: { type: string }
        earningsBalance: { type: string }
        depositAddress: { type: string }
        totalDeposited: { type: string }
        totalWithdrawn: { type: string }
        pendingWithdrawals: { type: string }
        recentDeposits:
          type: array
          items: { $ref: "#/components/schemas/Deposit" }
        recentWithdrawals:
          type: array
          items: { $ref: "#/components/schemas/Withdrawal" }
        recentP2P:
          type: array
          items: { $ref: "#/components/schemas/P2PTransfer" }

    Deposit:
      type: object
      required: [id, userId, amount, fee, netAmount, status, txHash, createdAt]
      properties:
        id: { type: string }
        userId: { type: string }
        amount: { type: string }
        fee: { type: string }
        netAmount: { type: string }
        status:
          type: string
          enum: [pending, sweeping, credited, failed]
        txHash: { type: ["string", "null"] }
        sweepTxHash: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        creditedAt: { type: ["string", "null"] }

    DepositCheckResult:
      type: object
      required: [found, message]
      properties:
        found: { type: boolean }
        amount: { type: ["string", "null"] }
        credited: { type: ["string", "null"] }
        message: { type: string }
        deposit: { $ref: "#/components/schemas/Deposit" }

    Withdrawal:
      type: object
      required: [id, userId, amount, fee, netAmount, destinationAddress, status, createdAt]
      properties:
        id: { type: string }
        userId: { type: string }
        amount: { type: string }
        fee: { type: string }
        netAmount: { type: string }
        destinationAddress: { type: string }
        status:
          type: string
          enum: [pending, approved, rejected]
        txHash: { type: ["string", "null"] }
        rejectionReason: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        processedAt: { type: ["string", "null"] }

    WithdrawalRequest:
      type: object
      required: [amount, destinationAddress]
      properties:
        amount: { type: string }
        destinationAddress: { type: string }

    P2PTransfer:
      type: object
      required: [id, senderId, receiverId, amount, createdAt]
      properties:
        id: { type: string }
        senderId: { type: string }
        receiverId: { type: string }
        senderEmail: { type: ["string", "null"] }
        receiverEmail: { type: ["string", "null"] }
        amount: { type: string }
        note: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }

    P2PTransferRequest:
      type: object
      required: [amount, recipientIdentifier]
      properties:
        amount: { type: string }
        recipientIdentifier: { type: string }
        note: { type: ["string", "null"] }

    PublicSettings:
      type: object
      required: [minDepositUsdt, depositFeeFlat, depositFeePercent, withdrawFeeFlat, withdrawFeePercent, withdrawFeeMode, withdrawalEnabled, otpWithdrawalEnabled]
      properties:
        minDepositUsdt: { type: string }
        depositFeeFlat: { type: string }
        depositFeePercent: { type: string }
        withdrawFeeFlat: { type: string }
        withdrawFeePercent: { type: string }
        withdrawFeeMode:
          type: string
          enum: [deduct_from_amount, deduct_from_balance]
        withdrawalEnabled: { type: boolean }
        otpWithdrawalEnabled: { type: boolean }

    PlatformSettings:
      type: object
      required: [minDepositUsdt, depositFeeFlat, depositFeePercent, withdrawFeeFlat, withdrawFeePercent, withdrawFeeMode, withdrawalMode, withdrawalEnabled, otpWithdrawalEnabled, adminMasterWallet, bscRpcUrl]
      properties:
        minDepositUsdt: { type: string }
        depositFeeFlat: { type: string }
        depositFeePercent: { type: string }
        withdrawFeeFlat: { type: string }
        withdrawFeePercent: { type: string }
        withdrawFeeMode:
          type: string
          enum: [deduct_from_amount, deduct_from_balance]
        withdrawalMode:
          type: string
          enum: [manual, auto]
        withdrawalEnabled: { type: boolean }
        otpWithdrawalEnabled: { type: boolean }
        adminMasterWallet: { type: string }
        bscRpcUrl: { type: string }
        gasWalletAddress: { type: ["string", "null"] }
        telegramBotToken: { type: string }
        telegramBotUsername: { type: string }

    SettingsUpdate:
      type: object
      properties:
        minDepositUsdt: { type: string }
        depositFeeFlat: { type: string }
        depositFeePercent: { type: string }
        withdrawFeeFlat: { type: string }
        withdrawFeePercent: { type: string }
        withdrawFeeMode:
          type: string
          enum: [deduct_from_amount, deduct_from_balance]
        withdrawalMode:
          type: string
          enum: [manual, auto]
        withdrawalEnabled: { type: boolean }
        otpWithdrawalEnabled: { type: boolean }
        adminMasterWallet: { type: string }
        bscRpcUrl: { type: string }
        gasWalletPrivateKey: { type: string }
        withdrawWalletPrivateKey: { type: string }
        telegramBotToken: { type: string }
        telegramBotUsername: { type: string }

    OtpSendRequest:
      type: object
      required: [phone]
      properties:
        phone: { type: string }

    OtpVerifyRequest:
      type: object
      required: [phone, code]
      properties:
        phone: { type: string }
        code: { type: string }

    TelegramConfig:
      type: object
      required: [botUsername, configured]
      properties:
        botUsername: { type: string }
        configured: { type: boolean }

    BlockToggle:
      type: object
      required: [blocked]
      properties:
        blocked: { type: boolean }

    AdminStats:
      type: object
      required: [totalUsers, totalDeposited, totalWithdrawn, pendingWithdrawals, totalP2P, depositCount, withdrawalCount]
      properties:
        totalUsers: { type: integer }
        totalDeposited: { type: string }
        totalWithdrawn: { type: string }
        pendingWithdrawals: { type: string }
        totalP2P: { type: string }
        depositCount: { type: integer }
        withdrawalCount: { type: integer }
        recentDeposits:
          type: array
          items: { $ref: "#/components/schemas/Deposit" }
        recentWithdrawals:
          type: array
          items: { $ref: "#/components/schemas/Withdrawal" }

    # ─── Shop schemas ─────────────────────────────────────────────────────────

    Category:
      type: object
      required: [id, name, slug, productCount]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        description: { type: ["string", "null"] }
        imageUrl: { type: ["string", "null"] }
        productCount: { type: integer }

    CategoryInput:
      type: object
      required: [name, slug]
      properties:
        name: { type: string }
        slug: { type: string }
        description: { type: ["string", "null"] }
        imageUrl: { type: ["string", "null"] }

    Product:
      type: object
      required: [id, name, slug, description, priceUsdt, stock, categoryId, imageUrls, isActive, isFeatured, averageRating, reviewCount, createdAt]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        priceUsdt: { type: string }
        compareAtPrice: { type: ["string", "null"] }
        stock: { type: integer }
        categoryId: { type: string }
        categoryName: { type: ["string", "null"] }
        imageUrls:
          type: array
          items: { type: string }
        tags:
          type: array
          items: { type: string }
        isActive: { type: boolean }
        isFeatured: { type: boolean }
        averageRating: { type: string }
        reviewCount: { type: integer }
        createdAt: { type: string, format: date-time }

    ProductDetail:
      type: object
      required: [id, name, slug, description, priceUsdt, stock, categoryId, imageUrls, isActive, isFeatured, averageRating, reviewCount, createdAt, reviews]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        priceUsdt: { type: string }
        compareAtPrice: { type: ["string", "null"] }
        stock: { type: integer }
        categoryId: { type: string }
        categoryName: { type: ["string", "null"] }
        imageUrls:
          type: array
          items: { type: string }
        tags:
          type: array
          items: { type: string }
        isActive: { type: boolean }
        isFeatured: { type: boolean }
        averageRating: { type: string }
        reviewCount: { type: integer }
        createdAt: { type: string, format: date-time }
        userHasPurchased: { type: boolean }
        userHasReviewed: { type: boolean }
        reviews:
          type: array
          items: { $ref: "#/components/schemas/Review" }

    ProductListResponse:
      type: object
      required: [products, total, limit, offset]
      properties:
        products:
          type: array
          items: { $ref: "#/components/schemas/Product" }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    ProductInput:
      type: object
      required: [name, slug, description, priceUsdt, stock, categoryId, imageUrls]
      properties:
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        priceUsdt: { type: string }
        compareAtPrice: { type: ["string", "null"] }
        stock: { type: integer }
        categoryId: { type: string }
        imageUrls:
          type: array
          items: { type: string }
        tags:
          type: array
          items: { type: string }
        isActive: { type: boolean }
        isFeatured: { type: boolean }

    ProductUpdate:
      type: object
      properties:
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        priceUsdt: { type: string }
        compareAtPrice: { type: ["string", "null"] }
        stock: { type: integer }
        categoryId: { type: string }
        imageUrls:
          type: array
          items: { type: string }
        tags:
          type: array
          items: { type: string }
        isActive: { type: boolean }
        isFeatured: { type: boolean }

    FeaturedResponse:
      type: object
      required: [featured, newArrivals, topRated, onSale]
      properties:
        featured:
          type: array
          items: { $ref: "#/components/schemas/Product" }
        newArrivals:
          type: array
          items: { $ref: "#/components/schemas/Product" }
        topRated:
          type: array
          items: { $ref: "#/components/schemas/Product" }
        onSale:
          type: array
          items: { $ref: "#/components/schemas/Product" }

    CartItem:
      type: object
      required: [id, productId, quantity, priceUsdt, product]
      properties:
        id: { type: string }
        productId: { type: string }
        quantity: { type: integer }
        priceUsdt: { type: string }
        product: { $ref: "#/components/schemas/Product" }

    Cart:
      type: object
      required: [items, subtotal, itemCount]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/CartItem" }
        subtotal: { type: string }
        itemCount: { type: integer }

    CartItemInput:
      type: object
      required: [productId, quantity]
      properties:
        productId: { type: string }
        quantity: { type: integer, minimum: 1 }

    CartItemUpdate:
      type: object
      required: [quantity]
      properties:
        quantity: { type: integer, minimum: 0 }

    OrderItem:
      type: object
      required: [id, productId, productName, quantity, priceUsdt, subtotal]
      properties:
        id: { type: string }
        productId: { type: string }
        productName: { type: string }
        productImageUrl: { type: ["string", "null"] }
        quantity: { type: integer }
        priceUsdt: { type: string }
        subtotal: { type: string }

    ShippingAddress:
      type: object
      required: [fullName, addressLine1, city, country]
      properties:
        fullName: { type: string }
        addressLine1: { type: string }
        addressLine2: { type: ["string", "null"] }
        city: { type: string }
        state: { type: ["string", "null"] }
        postalCode: { type: ["string", "null"] }
        country: { type: string }
        phone: { type: ["string", "null"] }

    Order:
      type: object
      required: [id, userId, status, totalUsdt, shippingAddress, items, createdAt, updatedAt]
      properties:
        id: { type: string }
        userId: { type: string }
        status:
          type: string
          enum: [pending, confirmed, shipped, delivered, cancelled]
        totalUsdt: { type: string }
        shippingAddress: { $ref: "#/components/schemas/ShippingAddress" }
        trackingNumber: { type: ["string", "null"] }
        items:
          type: array
          items: { $ref: "#/components/schemas/OrderItem" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CheckoutInput:
      type: object
      required: [shippingAddress]
      properties:
        shippingAddress: { $ref: "#/components/schemas/ShippingAddress" }

    OrderStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, confirmed, shipped, delivered, cancelled]
        trackingNumber: { type: ["string", "null"] }

    Review:
      type: object
      required: [id, productId, userId, rating, createdAt]
      properties:
        id: { type: string }
        productId: { type: string }
        userId: { type: string }
        userFullName: { type: ["string", "null"] }
        rating: { type: integer, minimum: 1, maximum: 5 }
        title: { type: ["string", "null"] }
        body: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }

    ReviewInput:
      type: object
      required: [rating]
      properties:
        rating: { type: integer, minimum: 1, maximum: 5 }
        title: { type: ["string", "null"] }
        body: { type: ["string", "null"] }

    Wishlist:
      type: object
      required: [productIds]
      properties:
        productIds:
          type: array
          items: { type: string }

    ShopStats:
      type: object
      required: [totalProducts, totalOrders, totalRevenue, pendingOrders, totalCategories, averageOrderValue]
      properties:
        totalProducts: { type: integer }
        totalOrders: { type: integer }
        totalRevenue: { type: string }
        pendingOrders: { type: integer }
        totalCategories: { type: integer }
        averageOrderValue: { type: string }
        recentOrders:
          type: array
          items: { $ref: "#/components/schemas/Order" }
        topProducts:
          type: array
          items: { $ref: "#/components/schemas/Product" }

    # ─── NFT Schemas ────────────────────────────────────────────────────────────

    NftGlobal:
      type: object
      required: [id, buyPrice, sellPrice, liquidity, expenses, nftPool, totalPurchase, reserveFund, userDistributionPercent, reserveFundDistributionPercent, canInvest, createdAt, updatedAt]
      properties:
        id: { type: string }
        buyPrice: { type: string }
        sellPrice: { type: string }
        liquidity: { type: string }
        expenses: { type: string }
        nftPool: { type: string }
        totalPurchase: { type: string }
        reserveFund: { type: string }
        userDistributionPercent: { type: string }
        reserveFundDistributionPercent: { type: string }
        canInvest: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    NftGlobalUpdate:
      type: object
      properties:
        canInvest: { type: boolean }
        userDistributionPercent: { type: string }
        reserveFundDistributionPercent: { type: string }
        buyPrice: { type: string }
        sellPrice: { type: string }
        liquidity: { type: string }
        expenses: { type: string }

    NftItem:
      type: object
      required: [id, title, image, price, status, createdAt, updatedAt]
      properties:
        id: { type: string }
        title: { type: string }
        image: { type: string }
        price: { type: string }
        status: { type: string, enum: [active, inactive] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    NftPool:
      type: object
      required: [id, nftId, level, poolSize, poolLimit, poolAmount, status, createdAt, updatedAt]
      properties:
        id: { type: string }
        nftId: { type: string }
        level: { type: integer }
        poolSize: { type: string }
        poolLimit: { type: string }
        poolAmount: { type: string }
        status: { type: string, enum: [active, inactive, completed] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    NftWithPools:
      allOf:
        - $ref: "#/components/schemas/NftItem"
        - type: object
          required: [pools]
          properties:
            pools:
              type: array
              items:
                $ref: "#/components/schemas/NftPool"

    NftPoolWithNft:
      allOf:
        - $ref: "#/components/schemas/NftPool"
        - type: object
          required: [nft]
          properties:
            nft:
              $ref: "#/components/schemas/NftItem"

    NftHolding:
      type: object
      required: [poolRewardAvailable, poolRewardClaimed, poolRewardClaimedUsdt, referralRewardAvailable, referralRewardClaimed, referralRewardClaimedUsdt, levelRewardAvailable, levelRewardClaimed, levelRewardClaimedUsdt, lifetimePurchased, holdingValueUsdt, sellPrice, buyPrice]
      properties:
        id: { type: string }
        userId: { type: string }
        poolRewardAvailable: { type: string }
        poolRewardClaimed: { type: string }
        poolRewardClaimedUsdt: { type: string }
        referralRewardAvailable: { type: string }
        referralRewardClaimed: { type: string }
        referralRewardClaimedUsdt: { type: string }
        levelRewardAvailable: { type: string }
        levelRewardClaimed: { type: string }
        levelRewardClaimedUsdt: { type: string }
        lifetimePurchased: { type: string }
        holdingValueUsdt: { type: string }
        sellPrice: { type: string }
        buyPrice: { type: string }

    NftBuyRequest:
      type: object
      required: [amount]
      properties:
        amount:
          type: number
          description: USDT amount (multiple of 10, max 1000)

    NftBuyResult:
      type: object
      required: [success, message, newWalletBalance]
      properties:
        success: { type: boolean }
        message: { type: string }
        newWalletBalance: { type: string }
        global:
          $ref: "#/components/schemas/NftGlobal"

    NftBidRequest:
      type: object
      required: [amount]
      properties:
        amount:
          type: number
          description: Whole number USDT amount to bid

    NftBidResult:
      type: object
      required: [success, message, newWalletBalance, contribution]
      properties:
        success: { type: boolean }
        message: { type: string }
        newWalletBalance: { type: string }
        contribution: { type: number }

    NftClaimRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [pool, referral, level]
          description: Which reward bucket to claim

    NftClaimResult:
      type: object
      required: [success, message, claimed, usdtCredited, newWalletBalance]
      properties:
        success: { type: boolean }
        message: { type: string }
        claimed: { type: number }
        usdtCredited: { type: number }
        newWalletBalance: { type: string }

    NftCreateRequest:
      type: object
      required: [title]
      properties:
        title: { type: string }
        image: { type: string }
        price: { type: string }

    NftUpdateRequest:
      type: object
      properties:
        title: { type: string }
        image: { type: string }
        price: { type: string }
        status: { type: string, enum: [active, inactive] }

    NftPoolCreateRequest:
      type: object
      required: [nftId, poolSize]
      properties:
        nftId: { type: string }
        level: { type: integer }
        poolSize: { type: string }
        poolLimit: { type: string }

    NftPoolStatusUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [active, inactive, completed]
        poolLimit: { type: string }

    NftPurchaseTransaction:
      type: object
      required: [id, amount, tokensReceived, buyPrice, createdAt]
      properties:
        id: { type: string }
        amount: { type: string }
        tokensReceived: { type: string }
        buyPrice: { type: string }
        createdAt: { type: string, format: date-time }

    UserNftActivation:
      type: object
      required: [investedUsdt]
      properties:
        investedUsdt: { type: string }

    UserNftActivationResult:
      type: object
      properties:
        success: { type: boolean }
        investedUsdt: { type: string }
