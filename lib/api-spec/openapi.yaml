openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CryptoVault Exchange & Shop API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: users
  - name: deposits
  - name: withdrawals
  - name: p2p
  - name: admin
  - name: settings
  - name: shop
  - name: shop-admin
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /users/me/dashboard:
    get:
      operationId: getDashboard
      tags: [users]
      summary: Get dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "401":
          description: Unauthorized

  /deposits:
    get:
      operationId: listDeposits
      tags: [deposits]
      summary: List user deposits
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Deposit list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deposit"
        "401":
          description: Unauthorized

  /deposits/check:
    post:
      operationId: checkDeposit
      tags: [deposits]
      summary: Check for on-chain USDT deposit
      responses:
        "200":
          description: Check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositCheckResult"
        "401":
          description: Unauthorized

  /withdrawals:
    get:
      operationId: listWithdrawals
      tags: [withdrawals]
      summary: List user withdrawals
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Withdrawal list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Withdrawal"
        "401":
          description: Unauthorized
    post:
      operationId: createWithdrawal
      tags: [withdrawals]
      summary: Request a USDT withdrawal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalRequest"
      responses:
        "201":
          description: Withdrawal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"
        "400":
          description: Validation error
        "401":
          description: Unauthorized

  /p2p:
    get:
      operationId: listP2PTransfers
      tags: [p2p]
      summary: List user P2P transfers
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: P2P transfer list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/P2PTransfer"
        "401":
          description: Unauthorized
    post:
      operationId: createP2PTransfer
      tags: [p2p]
      summary: Send USDT internally to another user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/P2PTransferRequest"
      responses:
        "201":
          description: Transfer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/P2PTransfer"
        "400":
          description: Validation error
        "401":
          description: Unauthorized

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get public platform settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicSettings"

  # ─── Shop ─────────────────────────────────────────────────────────────────

  /shop/products:
    get:
      operationId: listProducts
      tags: [shop]
      summary: List products
      parameters:
        - name: categoryId
          in: query
          schema: { type: ["string", "null"] }
        - name: search
          in: query
          schema: { type: ["string", "null"] }
        - name: minPrice
          in: query
          schema: { type: ["string", "null"] }
        - name: maxPrice
          in: query
          schema: { type: ["string", "null"] }
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, price_asc, price_desc, popular, rating]
            default: newest
        - name: limit
          in: query
          schema: { type: integer, default: 24 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"

  /shop/products/{productId}:
    get:
      operationId: getProduct
      tags: [shop]
      summary: Get product detail
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetail"
        "404":
          description: Not found

  /shop/products/{productId}/reviews:
    get:
      operationId: listProductReviews
      tags: [shop]
      summary: List reviews for a product
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Review list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createProductReview
      tags: [shop]
      summary: Post a review for a product
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "401":
          description: Unauthorized

  /shop/categories:
    get:
      operationId: listCategories
      tags: [shop]
      summary: List all product categories
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /shop/featured:
    get:
      operationId: getFeatured
      tags: [shop]
      summary: Get featured, new arrivals, top-rated, on-sale products
      responses:
        "200":
          description: Featured collections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeaturedResponse"

  /shop/cart:
    get:
      operationId: getCart
      tags: [shop]
      summary: Get current user's cart
      responses:
        "200":
          description: Cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "401":
          description: Unauthorized

  /shop/cart/items:
    post:
      operationId: addToCart
      tags: [shop]
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemInput"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "400":
          description: Validation error
        "401":
          description: Unauthorized

  /shop/cart/items/{itemId}:
    patch:
      operationId: updateCartItem
      tags: [shop]
      summary: Update cart item quantity
      parameters:
        - name: itemId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemUpdate"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "401":
          description: Unauthorized
    delete:
      operationId: removeCartItem
      tags: [shop]
      summary: Remove item from cart
      parameters:
        - name: itemId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "401":
          description: Unauthorized

  /shop/cart/clear:
    delete:
      operationId: clearCart
      tags: [shop]
      summary: Clear all items from cart
      responses:
        "200":
          description: Empty cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "401":
          description: Unauthorized

  /shop/orders:
    get:
      operationId: listOrders
      tags: [shop]
      summary: List current user's orders
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          description: Unauthorized
    post:
      operationId: createOrder
      tags: [shop]
      summary: Place an order — deducts USDT from wallet balance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Insufficient balance or validation error
        "401":
          description: Unauthorized

  /shop/orders/{orderId}:
    get:
      operationId: getOrder
      tags: [shop]
      summary: Get order detail
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

  /shop/wishlist:
    get:
      operationId: getWishlist
      tags: [shop]
      summary: Get current user's wishlist
      responses:
        "200":
          description: Wishlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wishlist"
        "401":
          description: Unauthorized

  /shop/wishlist/{productId}:
    post:
      operationId: addToWishlist
      tags: [shop]
      summary: Add product to wishlist
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Wishlist updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wishlist"
        "401":
          description: Unauthorized
    delete:
      operationId: removeFromWishlist
      tags: [shop]
      summary: Remove product from wishlist
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Wishlist updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wishlist"
        "401":
          description: Unauthorized

  # ─── Shop Admin ───────────────────────────────────────────────────────────

  /shop/admin/stats:
    get:
      operationId: adminGetShopStats
      tags: [shop-admin]
      summary: Get shop stats (admin)
      responses:
        "200":
          description: Shop stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopStats"
        "403":
          description: Forbidden

  /shop/admin/products:
    get:
      operationId: adminListProducts
      tags: [shop-admin]
      summary: List all products (admin)
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
        "403":
          description: Forbidden
    post:
      operationId: adminCreateProduct
      tags: [shop-admin]
      summary: Create a new product (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "403":
          description: Forbidden

  /shop/admin/products/{productId}:
    patch:
      operationId: adminUpdateProduct
      tags: [shop-admin]
      summary: Update a product (admin)
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "403":
          description: Forbidden
    delete:
      operationId: adminDeleteProduct
      tags: [shop-admin]
      summary: Delete a product (admin)
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted
        "403":
          description: Forbidden

  /shop/admin/categories:
    post:
      operationId: adminCreateCategory
      tags: [shop-admin]
      summary: Create a category (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "403":
          description: Forbidden

  /shop/admin/orders:
    get:
      operationId: adminListOrders
      tags: [shop-admin]
      summary: List all orders (admin)
      parameters:
        - name: status
          in: query
          schema: { type: ["string", "null"] }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: All orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "403":
          description: Forbidden

  /shop/admin/orders/{orderId}/status:
    patch:
      operationId: adminUpdateOrderStatus
      tags: [shop-admin]
      summary: Update order status (admin)
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "403":
          description: Forbidden

  # ─── Exchange Admin ───────────────────────────────────────────────────────

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users (admin)
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
        - name: search
          in: query
          schema: { type: string }
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/users/{userId}/block:
    patch:
      operationId: adminToggleUserBlock
      tags: [admin]
      summary: Toggle withdrawal block on user
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlockToggle"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/deposits:
    get:
      operationId: adminListDeposits
      tags: [admin]
      summary: List all deposits (admin)
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Deposit list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deposit"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/withdrawals:
    get:
      operationId: adminListWithdrawals
      tags: [admin]
      summary: List all withdrawals (admin)
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Withdrawal list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Withdrawal"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/withdrawals/{id}/approve:
    post:
      operationId: adminApproveWithdrawal
      tags: [admin]
      summary: Approve a pending withdrawal
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Withdrawal approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/withdrawals/{id}/reject:
    post:
      operationId: adminRejectWithdrawal
      tags: [admin]
      summary: Reject a pending withdrawal
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Withdrawal rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/settings:
    get:
      operationId: adminGetSettings
      tags: [admin]
      summary: Get all platform settings (admin)
      responses:
        "200":
          description: All settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSettings"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
    put:
      operationId: adminUpdateSettings
      tags: [admin]
      summary: Update platform settings (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSettings"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Get platform stats (admin)
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    User:
      type: object
      required: [id, clerkId, email, walletBalance, earningsBalance, depositAddress, referralCode, isAdmin, withdrawalBlocked, createdAt]
      properties:
        id: { type: string }
        clerkId: { type: string }
        email: { type: string }
        fullName: { type: ["string", "null"] }
        walletBalance: { type: string }
        earningsBalance: { type: string }
        depositAddress: { type: string }
        referralCode: { type: string }
        isAdmin: { type: boolean }
        withdrawalBlocked: { type: boolean }
        createdAt: { type: string, format: date-time }

    AdminUser:
      type: object
      required: [id, clerkId, email, walletBalance, earningsBalance, depositAddress, referralCode, isAdmin, withdrawalBlocked, createdAt]
      properties:
        id: { type: string }
        clerkId: { type: string }
        email: { type: string }
        fullName: { type: ["string", "null"] }
        walletBalance: { type: string }
        earningsBalance: { type: string }
        depositAddress: { type: string }
        referralCode: { type: string }
        isAdmin: { type: boolean }
        withdrawalBlocked: { type: boolean }
        createdAt: { type: string, format: date-time }
        totalDeposited: { type: string }
        totalWithdrawn: { type: string }

    DashboardSummary:
      type: object
      required: [walletBalance, earningsBalance, depositAddress, totalDeposited, totalWithdrawn, pendingWithdrawals, recentDeposits, recentWithdrawals, recentP2P]
      properties:
        walletBalance: { type: string }
        earningsBalance: { type: string }
        depositAddress: { type: string }
        totalDeposited: { type: string }
        totalWithdrawn: { type: string }
        pendingWithdrawals: { type: string }
        recentDeposits:
          type: array
          items: { $ref: "#/components/schemas/Deposit" }
        recentWithdrawals:
          type: array
          items: { $ref: "#/components/schemas/Withdrawal" }
        recentP2P:
          type: array
          items: { $ref: "#/components/schemas/P2PTransfer" }

    Deposit:
      type: object
      required: [id, userId, amount, fee, netAmount, status, txHash, createdAt]
      properties:
        id: { type: string }
        userId: { type: string }
        amount: { type: string }
        fee: { type: string }
        netAmount: { type: string }
        status:
          type: string
          enum: [pending, sweeping, credited, failed]
        txHash: { type: ["string", "null"] }
        sweepTxHash: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        creditedAt: { type: ["string", "null"] }

    DepositCheckResult:
      type: object
      required: [found, message]
      properties:
        found: { type: boolean }
        amount: { type: ["string", "null"] }
        credited: { type: ["string", "null"] }
        message: { type: string }
        deposit: { $ref: "#/components/schemas/Deposit" }

    Withdrawal:
      type: object
      required: [id, userId, amount, fee, netAmount, destinationAddress, status, createdAt]
      properties:
        id: { type: string }
        userId: { type: string }
        amount: { type: string }
        fee: { type: string }
        netAmount: { type: string }
        destinationAddress: { type: string }
        status:
          type: string
          enum: [pending, approved, rejected]
        txHash: { type: ["string", "null"] }
        rejectionReason: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        processedAt: { type: ["string", "null"] }

    WithdrawalRequest:
      type: object
      required: [amount, destinationAddress]
      properties:
        amount: { type: string }
        destinationAddress: { type: string }

